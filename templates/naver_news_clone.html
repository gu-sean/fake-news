<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 가짜뉴스 탐지 — 실시간 비교</title>
  <link rel="shortcut icon" type="image/x-icon"
        href="https://mimgnews.pstatic.net/image/news/m/2023/favicon/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Malgun Gothic', 돋움, sans-serif;
    }

    /* ── 2분할 컨테이너 ────────────────────────────── */
    .split-wrap {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* ── 각 패널 ──────────────────────────────────── */
    .panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── 로딩 오버레이 ────────────────────────────── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: #888;
      pointer-events: none;
      z-index: 5;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .spinner.blue { border-top-color: #0069c0; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 드래그 구분선 ────────────────────────────── */
    .drag-divider {
      width: 6px;
      flex-shrink: 0;
      background: #d0d0d0;
      cursor: col-resize;
      position: relative;
      z-index: 10;
      transition: background .15s;
    }

    .drag-divider:hover,
    .drag-divider.dragging { background: #888; }

    .drag-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 40px;
      background: rgba(255,255,255,.7);
      border-radius: 2px;
    }
  </style>
</head>
<body>

<div class="split-wrap" id="splitWrap">

  <!-- 왼쪽 패널: 실제 네이버 뉴스 (서버 프록시 경유) -->
  <div class="panel" id="leftPanel">
    <div class="loading-overlay" id="leftLoading">
      <div class="spinner"></div>
      <span>네이버 뉴스 불러오는 중…</span>
    </div>
    <iframe
      id="naverIframe"
      src="/proxy/naver"
      title="실제 네이버 뉴스 속보"
    ></iframe>
  </div>

  <!-- 드래그 구분선 -->
  <div class="drag-divider" id="dragDivider"></div>

  <!-- 오른쪽 패널: AI 탐지 결과 -->
  <div class="panel" id="rightPanel">
    <div class="loading-overlay" id="rightLoading">
      <div class="spinner blue"></div>
      <span>AI 탐지 결과 불러오는 중…</span>
    </div>
    <iframe
      id="cloneIframe"
      src="/view"
      title="AI 가짜뉴스 탐지 결과"
    ></iframe>
  </div>

</div>

<script>
(function () {
  /* ── 로딩 완료 시 스피너 제거 ────────────────────── */
  document.getElementById('naverIframe').addEventListener('load', function () {
    var el = document.getElementById('leftLoading');
    if (el) el.style.display = 'none';
  });
  document.getElementById('cloneIframe').addEventListener('load', function () {
    var el = document.getElementById('rightLoading');
    if (el) el.style.display = 'none';
  });

  /* ── 구분선 드래그 리사이즈 ─────────────────────── */
  var splitWrap   = document.getElementById('splitWrap');
  var leftPanel   = document.getElementById('leftPanel');
  var rightPanel  = document.getElementById('rightPanel');
  var divider     = document.getElementById('dragDivider');
  var naverIframe = document.getElementById('naverIframe');
  var cloneIframe = document.getElementById('cloneIframe');
  var dragging    = false;

  divider.addEventListener('mousedown', function (e) {
    e.preventDefault();
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor      = 'col-resize';
    document.body.style.userSelect  = 'none';
    naverIframe.style.pointerEvents = 'none';
    cloneIframe.style.pointerEvents = 'none';
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var rect = splitWrap.getBoundingClientRect();
    var pct  = Math.min(Math.max(((e.clientX - rect.left) / rect.width) * 100, 15), 85);
    leftPanel.style.flex  = 'none';
    rightPanel.style.flex = 'none';
    leftPanel.style.width  = pct + '%';
    rightPanel.style.width = (100 - pct) + '%';
  });

  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor      = '';
    document.body.style.userSelect  = '';
    naverIframe.style.pointerEvents = '';
    cloneIframe.style.pointerEvents = '';
  });
})();
</script>

</body>
</html>
